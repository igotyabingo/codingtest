name: Sync Codetree Subtree

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 1시
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add codetree remote
        run: |
          git remote get-url codetree || git remote add codetree https://github.com/igotyabingo/codetree.git
          git fetch codetree

      - name: Sync codetree subtree
        run: |
          if [ ! -d "codetree" ]; then
            git subtree add --prefix=codetree codetree main -m "chore(subtree): add codetree"
          else
            git subtree pull --prefix=codetree codetree main -m "chore(subtree): sync codetree"
          fi

      - name: Push changes
        run: |
          git push origin main
